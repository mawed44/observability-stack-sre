apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure
    folder: Observabilite
    interval: 1m
    rules:
      - uid: cpu_usage_high
        title: Utilisation CPU elevee
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: '100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])))'
              instant: true
              intervalMs: 15000
              legendFormat: CPU
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        dashboardUid: node-exporter-modern
        panelId: 1
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          description: Le processeur depasse 80 % depuis au moins 2 minutes.
          summary: Utilisation CPU elevee sur Node Exporter
        labels:
          severity: warning
          service: node-exporter

contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord_observability
        type: discord
        disableResolveMessage: false
        settings:
          url: $DISCORD_WEBHOOK_URL
          use_discord_username: false

policies:
  - orgId: 1
    receiver: Discord
    group_by:
      - alertname
      - service
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
