# Grafana charge cette règle et le contact Discord au démarrage.
apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure
    folder: Alertes
    interval: 1m
    rules:
      - uid: cpu_usage_high
        title: Utilisation élevée du CPU
        condition: C
        data:
          # A : demande à Prometheus le pourcentage moyen de CPU utilisé.
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: '100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])))'
              instant: true
              range: false
              intervalMs: 15000
              maxDataPoints: 43200
              refId: A

          # B : transforme la série A en une seule valeur, la plus récente.
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce

          # C : vérifie si la valeur B dépasse le seuil de 80 %.
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold

        # Associe l’alerte à la jauge CPU du dashboard.
        dashboardUid: node-exporter-modern
        panelId: 1
        noDataState: NoData
        execErrState: Error
        # Le dépassement doit durer deux minutes avant la notification.
        for: 2m
        annotations:
          description: L’utilisation du processeur dépasse 80 % depuis au moins 2 minutes.
          summary: Utilisation élevée du CPU sur Node Exporter
        labels:
          severity: warning
          service: node-exporter

contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord_observability
        type: discord
        disableResolveMessage: false
        settings:
          url: $DISCORD_WEBHOOK_URL

# Toutes les alertes sont envoyées vers le contact Discord ci-dessus.
policies:
  - orgId: 1
    receiver: Discord
    group_by: [alertname, service]
    group_wait: 10s
