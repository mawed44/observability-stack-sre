apiVersion: 1

providers:
  - name: Observabilite
    orgId: 1
    folder: Observabilite
    folderUid: observabilite
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
